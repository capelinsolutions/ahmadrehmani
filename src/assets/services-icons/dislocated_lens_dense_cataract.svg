<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-width="2.857" stroke-linecap="round" stroke-linejoin="round">
  <g transform="translate(-12.00,-12.00) scale(1.12)">
  <!-- Eyeball globe -->
  <circle cx="100" cy="100" r="60"/>
  <!-- Cornea bump on left (front of eye) -->
  <path d="M42 78 C24 88, 24 112, 42 122"/>
  <!-- Dotted outline showing where the lens should sit (centered) -->
  <ellipse cx="64" cy="100" rx="9" ry="22" stroke-width="1.786" stroke-dasharray="3 5"/>
  <!-- Dense cloudy lens, dislocated: tilted and dropped down/back -->
  <ellipse cx="104" cy="120" rx="14" ry="24" transform="rotate(32 104 120)"/>
  <!-- Opacity hatch marks inside lens (cataract density) -->
  <line x1="95" y1="115" x2="112" y2="122" stroke-width="1.964"/>
  <line x1="98" y1="108" x2="113" y2="115" stroke-width="1.964"/>
  <line x1="93" y1="125" x2="108" y2="131" stroke-width="1.964"/>
  <!-- Displacement arrow from original spot to new spot -->
  <path d="M76 104 C84 110, 92 114, 98 118" stroke-width="1.786" stroke-dasharray="3 4"/>
  <path d="M98 118 l-9 -1 m9 1 l-3 -8" stroke-width="1.786"/>
</g>
</svg>